<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Cotação - Portal do Fornecedor</title>
    <link rel="stylesheet" href="/css/detalhes-cotacao.css">
</head>
<body>
<div class="container">
    <header class="header">
        <h1>Portal do Fornecedor</h1>
        <div class="user-info">Olá, Fornecedor</div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="menu-section">
                <div class="menu-item active">
                    <span>COTAÇÕES</span>
                    <span class="arrow">→</span>
                </div>
            </div>
        </aside>

        <main class="content">
            <div class="page-header">
                <h2 id="idCotacao">1023</h2>
            </div>

            <div class="cotacao-info">
                <div class="info-card">
                    <span class="info-label">ID Cotação</span>
                    <span class="info-value">1023</span>
                </div>
                <div class="info-card">
                    <span class="info-label">Colaborador</span>
                    <span class="info-value" id="colaborador">Leiroz e Vieira</span>
                </div>
                <div class="info-card">
                    <span class="info-label">Status</span>
                    <span class="info-value status-andamento" id="status">Em Andamento</span>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn-salvar" id="btnSalvarTodas">💾 Salvar Todas as Alterações</button>
                <button class="btn-cancelar" id="btnCancelar">✕ Cancelar Alterações</button>
            </div>

            <div class="divider"></div>

            <!-- CONTAINER CORRETO PARA O PASSO B -->
            <div id="listaMateriais"></div>

            <div class="divider"></div>

            <div class="total-resumo">
                <h3>VALOR TOTAL DA COTAÇÃO</h3>
                <div id="valorTotalCotacao">R$ 0,00</div>
                <button class="btn-enviar" id="btnEnviarProposta" style="margin-top:15px">
                    📤 Enviar Proposta
                </button>

                <div style="display:none">
                    <span id="subtotalCotacao"></span>
                    <span id="totalDescontos"></span>
                    <span id="totalIPI"></span>
                    <span id="totalICMS"></span>
                    <span id="data"></span>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="/js/detalhes-cotacao.js"></script>
</body>
</html>
